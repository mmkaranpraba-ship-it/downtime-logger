<!DOCTYPE html>
<html>
<head>
    <title>Shopfloor Reporter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .branding {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            font-family: 'Poppins', 'Arial Black', 'Segoe UI Black', sans-serif;
            color: #FFD700;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255,215,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 5px;
            color: #fff;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-family: monospace;
            margin: 20px 0;
            background: #0f3460;
            color: white;
            border: 1px solid #00b894;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin: 10px 0;
        }
        button {
            flex: 1;
            background: #00b894;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.98); }
        .speak-btn {
            background: #e67e22;
        }
        .clear-btn {
            background: #d63031;
        }
        .status {
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 30px;
            margin: 15px 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #f1c40f;
        }
        .examples {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .example {
            background: #2c3e50;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #ecf0f1;
        }
        .example:active { background: #e67e22; }
        .footer-note {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-top: 25px;
        }
    </style>
</head>
<body>
<div class="branding">🔧 M.M.Consultant</div>
<div class="container">
    <h1>🎙️ REPORT MACHINE ISSUE</h1>
    <textarea id="reportText" rows="3" placeholder="Type or speak your report here...&#10;Example: CNC machine stopped, power failure"></textarea>
    
    <div class="button-group">
        <button id="speakBtn" class="speak-btn">🎤 SPEAK</button>
        <button id="clearBtn" class="clear-btn">🗑️ CLEAR</button>
        <button id="submitBtn">✅ SUBMIT</button>
    </div>
    
    <div class="status" id="statusMsg">📢 Ready – type, use examples, or tap SPEAK.</div>
    
    <div class="examples">
        <span class="example" onclick="setExample('CNC machine stopped, power failure')">⚙️ CNC: power failure</span>
        <span class="example" onclick="setExample('Lathe machine motor problem')">🔩 Lathe: motor problem</span>
        <span class="example" onclick="setExample('Grinder bearing failed')">🛠️ Grinder: bearing failed</span>
    </div>
    <div class="footer-note">💡 Tap SPEAK, allow microphone, then speak clearly. Maximum 30 seconds – tap again to stop. If voice doesn't work, type manually.</div>
</div>

<script>
    const reportText = document.getElementById('reportText');
    const submitBtn = document.getElementById('submitBtn');
    const speakBtn = document.getElementById('speakBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusMsg = document.getElementById('statusMsg');
    
    let recognition = null;
    let listening = false;
    let timeoutId = null;
    
    // Function to stop recognition and clean up
    function stopRecognition() {
        if (recognition) {
            try {
                recognition.abort();
            } catch(e) {}
            recognition = null;
        }
        if (timeoutId) {
            clearTimeout(timeoutId);
            timeoutId = null;
        }
        listening = false;
        speakBtn.disabled = false;
        speakBtn.innerText = '🎤 SPEAK';
    }
    
    // Initialize recognition (called each time to ensure fresh state)
    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusMsg.innerHTML = '❌ Your browser does not support speech recognition. Please type your report.';
            speakBtn.disabled = true;
            return null;
        }
        
        const recog = new SpeechRecognition();
        recog.continuous = false;
        recog.interimResults = false;
        recog.lang = 'en';  // 'en' is more universally supported than 'en-IN'
        
        recog.onstart = () => {
            listening = true;
            statusMsg.innerHTML = '🎙️ Listening... (max 30 sec)';
            speakBtn.disabled = true;
            speakBtn.innerText = '🎤 LISTENING...';
            timeoutId = setTimeout(() => {
                if (listening) {
                    stopRecognition();
                    statusMsg.innerHTML = '⏱️ 30 seconds over. Tap SPEAK again if needed.';
                }
            }, 30000);
        };
        
        recog.onend = () => {
            if (listening) {
                // Recognition ended naturally
                stopRecognition();
                if (!reportText.value.trim()) {
                    statusMsg.innerHTML = '📢 No speech detected. Tap SPEAK and speak clearly, or type manually.';
                } else {
                    statusMsg.innerHTML = '✅ Text ready. You can edit above, then click SUBMIT.';
                }
            }
        };
        
        recog.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            reportText.value = transcript;
            statusMsg.innerHTML = '✅ Text filled. You can edit above, then click SUBMIT.';
            // Stop recognition immediately after result
            if (recognition) {
                try {
                    recognition.stop();
                } catch(e) {}
            }
            stopRecognition();
        };
        
        recog.onerror = (event) => {
            console.error("Speech error:", event.error);
            let msg = '';
            if (event.error === 'not-allowed') {
                msg = '❌ Microphone permission denied. Please allow microphone in browser settings.';
            } else if (event.error === 'no-speech') {
                msg = '❌ No speech detected. Tap SPEAK and speak clearly.';
            } else {
                msg = '❌ Speech error: ' + event.error + '. Please type manually.';
            }
            statusMsg.innerHTML = msg;
            stopRecognition();
        };
        
        return recog;
    }
    
    speakBtn.addEventListener('click', async () => {
        // If already listening, stop
        if (listening) {
            stopRecognition();
            statusMsg.innerHTML = '📢 Stopped. You can type or tap SPEAK again.';
            return;
        }
        
        // Request microphone permission explicitly (helps with some browsers)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // Permission granted, stop the stream immediately (we only need permission)
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            statusMsg.innerHTML = '❌ Microphone access denied. Please allow microphone and refresh.';
            return;
        }
        
        // Initialize a new recognition instance
        recognition = initRecognition();
        if (!recognition) return;
        
        try {
            recognition.start();
        } catch (e) {
            statusMsg.innerHTML = '❌ Error starting speech. Try refreshing the page.';
            console.error(e);
        }
    });
    
    function setExample(text) {
        reportText.value = text;
        statusMsg.innerHTML = '📋 Example loaded. Edit if needed, then click SUBMIT.';
    }
    
    clearBtn.addEventListener('click', () => {
        reportText.value = '';
        statusMsg.innerHTML = '📢 Cleared. You can type, use examples, or tap SPEAK.';
    });
    
    submitBtn.addEventListener('click', () => {
        const message = reportText.value.trim();
        if (!message) {
            statusMsg.innerHTML = '❌ Please type, speak, or select an example first.';
            return;
        }
        statusMsg.innerHTML = '📤 Sending...';
        submitBtn.disabled = true;
        fetch('/whatsapp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'Body=' + encodeURIComponent(message)
        })
        .then(res => res.text())
        .then(data => {
            statusMsg.innerHTML = '✅ Sent! Dashboard will update.';
            reportText.value = '';
            setTimeout(() => {
                submitBtn.disabled = false;
                statusMsg.innerHTML = '📢 Ready for next report.';
            }, 2000);
        })
        .catch(err => {
            statusMsg.innerHTML = '❌ Server error. Please try again.';
            submitBtn.disabled = false;
        });
    });
</script>
</body>
</html>
