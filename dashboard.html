<!DOCTYPE html>
<html>
<head>
    <title>Factory Downtime Tracker</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        h1 { text-align: center; }
        .loss-card { background: #d63031; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .loss-amount { font-size: 48px; font-weight: bold; }
        .machines-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .machine { background: #16213e; padding: 15px; border-radius: 10px; text-align: center; }
        .machine.stopped { border: 2px solid #d63031; background: #1a0a0a; }
        .machine.running { border: 2px solid #00b894; }
        .status { font-size: 20px; margin: 10px 0; }
        .running .status { color: #00b894; }
        .stopped .status { color: #d63031; }
        .cause { color: #ff7675; font-size: 14px; }
        .loss-small { color: #ff7675; font-size: 12px; margin-top: 5px; }
        .footer { text-align: center; margin-top: 20px; color: #666; }
        .reset-btn { background: #d63031; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .reset-btn:hover { background: #b52b2b; }
        .status-badge { background: #25D366; color: black; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <h1>🏭 Factory Downtime Tracker</h1>
    
    <div class="status-badge">
        📡 Live updates every 3 seconds | Speak machine name or number
    </div>
    
    <div class="loss-card">
        <div>💰 TODAY'S TOTAL LOSS</div>
        <div class="loss-amount" id="totalLoss">₹0</div>
    </div>
    
    <button class="reset-btn" onclick="resetMachines()">🗑️ Reset All Machines</button>
    
    <div class="machines-grid" id="machinesGrid"></div>
    
    <div class="footer">
        Last updated: <span id="timestamp"></span>
    </div>

    <script>
        // Machine data with hourly costs (display names must match those from server)
        const machines = [
            { id: 1, displayName: "CNC Machine", status: "running", cause: null, hourlyCost: 8000 },
            { id: 2, displayName: "Lathe Machine", status: "running", cause: null, hourlyCost: 6000 },
            { id: 3, displayName: "Grinder", status: "running", cause: null, hourlyCost: 4000 }
        ];
        
        function calculateTotalLoss() {
            let total = 0;
            machines.forEach(m => {
                if (m.status === "stopped") total += m.hourlyCost;
            });
            return total;
        }
        
        function updateDashboard() {
            const grid = document.getElementById('machinesGrid');
            const totalLoss = calculateTotalLoss();
            document.getElementById('totalLoss').innerHTML = `₹${totalLoss.toLocaleString()}`;
            document.getElementById('timestamp').innerHTML = new Date().toLocaleTimeString();
            
            let html = '';
            machines.forEach(m => {
                const statusClass = m.status;
                const statusIcon = m.status === 'running' ? '🟢' : '🔴';
                const statusText = m.status === 'running' ? 'RUNNING' : 'STOPPED';
                let causeHtml = '';
                let lossHtml = '';
                if (m.status === 'stopped') {
                    causeHtml = `<div class="cause">⚠️ Cause: ${m.cause}</div>`;
                    lossHtml = `<div class="loss-small">💰 Loss: ₹${m.hourlyCost.toLocaleString()}/hour</div>`;
                }
                html += `
                    <div class="machine ${statusClass}">
                        <div><strong>${m.displayName}</strong></div>
                        <div class="status">${statusIcon} ${statusText}</div>
                        ${causeHtml}
                        ${lossHtml}
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        function resetMachines() {
            fetch('/reset')
                .then(() => {
                    // Reset local machine status
                    machines.forEach(m => {
                        m.status = "running";
                        m.cause = null;
                    });
                    updateDashboard();
                })
                .catch(err => console.log("Reset error:", err));
        }
        
        function loadDowntimeEvents() {
            fetch('/get_events')
                .then(response => response.json())
                .then(data => {
                    if (data.events && data.events.length > 0) {
                        // Reset all machines to running first
                        machines.forEach(m => {
                            m.status = "running";
                            m.cause = null;
                        });
                        // Apply events (latest events may have multiple for same machine; last one wins)
                        data.events.forEach(event => {
                            const machineName = event.machine;
                            const machine = machines.find(m => m.displayName === machineName);
                            if (machine) {
                                machine.status = "stopped";
                                machine.cause = event.cause;
                            }
                        });
                        updateDashboard();
                    }
                })
                .catch(err => console.log("Server error:", err));
        }
        
        // Initial load
        updateDashboard();
        // Auto-refresh every 3 seconds (reliable, instant)
        setInterval(loadDowntimeEvents, 3000);
        // Also load immediately
        loadDowntimeEvents();
    </script>
</body>
</html>
